<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Website Trust Checker</title>

    <style>
        .result-box {
    background: #f5f9ff;
    padding: 18px;
    border-radius: 10px;
    border-left: 5px solid #0b2c4d;
    margin-top: 15px;
}

/* Hover preview */
.preview-wrapper {
    position: relative;
    display: inline-block;
    font-weight: 600;
    color: #0b2c4d;
    cursor: pointer;
}

.website-preview {
    display: none;
    position: absolute;
    top: 30px;
    left: 0;
    width: 380px;
    height: 220px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    overflow: hidden;
    z-index: 999;
}

.website-preview iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.preview-wrapper:hover .website-preview {
    display: block;
}
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f6f8fb;
        }

        /* ===== HEADER ===== */
        .header {
            background: #0b2c4d;
            color: white;
            padding: 2px 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
        }

        .header p {
            margin-top: 6px;
            font-size: 14px;
            opacity: 0.9;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* ===== CARD ===== */
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card h2 {
            margin-bottom: 15px;
            color: #0b2c4d;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        button {
            background: #0b2c4d;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #083056;
        }

        /* ===== RESULT BOX ===== */
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background: #f2f6fb;
            border-left: 6px solid #0b2c4d;
        }

        .result p {
            margin: 6px 0;
            font-size: 15px;
        }

        /* ===== BACK LINK ===== */
        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-weight: 600;
            color: #0b2c4d;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <h1>Website Trust Analysis</h1>
    <p>Evaluate website safety using security intelligence and threat indicators</p>
</div>

<!-- ===== CONTENT ===== -->
<div class="container">
    <div class="card">

        <h2>Check Website URL</h2>

        <form method="POST">
            <input 
                type="text" 
                name="url" 
                placeholder="Enter website URL (https://example.com)" 
                required
            >
            <button type="submit">Check Website</button>
        </form>

        {% if result %}
        <div class="result">
            
            <p><strong>Status:</strong> {{ result }}</p>
            <p><strong>Risk Level:</strong> {{ risk_level }}</p>
           
        </div>
        {% endif %}

        <a class="back-link" href="{{ url_for('dashboard') }}">
            ← Back to Dashboard
        </a>

    </div>
</div>

</body>
</html>
